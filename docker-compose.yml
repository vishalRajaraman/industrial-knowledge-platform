version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# InduStreakAI — Docker Compose (LOCAL DEVELOPMENT)
#
# CLOUD SERVICES (NOT in this compose — external):
#   • Qdrant Cloud    → set QDRANT_URL + QDRANT_API_KEY in .env
#   • Neo4j AuraDB    → set NEO4J_URI + NEO4J_PASSWORD in .env
#   • AWS S3          → set AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY in .env
#   • Groq API        → set GROQ_API_KEY in .env
#
# LOCAL SERVICES (this file):
#   • Single MCP Server (replaces 6 separate servers)
#   • PostgreSQL (orchestrator metadata)
#   • Frontend Next.js
#   • Orchestrator (chat/auth API)
#
# Local ingestion: drop files into data/watch_inbox/ — watcher auto-ingests them.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL (orchestrator metadata & sessions) ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ikp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ikp_user
      POSTGRES_PASSWORD: ikp_pass
      POSTGRES_DB: ikplatform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ikp_user -d ikplatform
      interval: 10s
      timeout: 5s
      retries: 5


  # ── SINGLE MCP SERVER (replaces 6 separate MCP servers) ────────────────────
  # All intelligence tools in one container:
  #   ingestion, knowledge engineering, search, RAG, maintenance, compliance, lessons
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: ikp-mcp-server
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      # Cloud services — loaded from .env
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Object storage — AWS S3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-south-1}
      - S3_BUCKET=${S3_BUCKET:-industreak-raw-assets}
      - S3_POLL_INTERVAL=${S3_POLL_INTERVAL:-60}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL:-}
      # Local file watcher
      - WATCH_FOLDER=/app/data/watch_inbox
      - WATCH_RECURSIVE=${WATCH_RECURSIVE:-false}
      # Embedding
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-1536}
      # Server
      - PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data                      # Local watch_inbox folder (mounted into container)
      - ./mcp-server/ontology:/app/ontology   # Industrial ontology files
      - model_cache:/root/.cache              # Embedding model cache
    depends_on:
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Orchestrator (BFF API — auth, sessions, LLM orchestration) ─────────────
  orchestrator:
    build: ./orchestrator
    container_name: ikp-orchestrator
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MCP_SERVER_URL=http://mcp-server:8080   # SINGLE server URL now
      - DATABASE_URL=postgresql://ikp_user:ikp_pass@postgres:5432/ikplatform
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8000/health || exit 1
      interval: 20s
      timeout: 5s
      retries: 5

  # ── Frontend (Next.js PWA) ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: ikp-frontend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - orchestrator

volumes:
  postgres_data:
  model_cache:    # Persists downloaded embedding model across restarts
